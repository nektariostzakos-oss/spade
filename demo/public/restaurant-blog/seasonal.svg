<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0%" stop-color="#f9f0df"/><stop offset="100%" stop-color="#d7c5a4"/></radialGradient>
    <radialGradient id="tomato" cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#e04628"/><stop offset="100%" stop-color="#8a1c0c"/></radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- basket with veggies flat lay -->
  <g transform="translate(400 340)">
    <!-- tomatoes -->
    <circle cx="-120" cy="0" r="60" fill="url(#tomato)"/>
    <ellipse cx="-140" cy="-40" rx="10" ry="16" fill="#ffffff" opacity="0.3" transform="rotate(-25 -140 -40)"/>
    <path d="M-120 -60 Q-140 -70 -140 -55 Q-130 -62 -120 -56 Q-110 -62 -100 -55 Q-100 -70 -120 -60 Z" fill="#4a5630"/>
    <circle cx="-40" cy="30" r="45" fill="url(#tomato)"/>
    <circle cx="40" cy="-10" r="52" fill="url(#tomato)"/>
    <!-- basil leaves -->
    <ellipse cx="100" cy="-80" rx="30" ry="14" fill="#4a5630" transform="rotate(-25 100 -80)"/>
    <ellipse cx="130" cy="-60" rx="28" ry="13" fill="#6b7a42" transform="rotate(10 130 -60)"/>
    <ellipse cx="150" cy="-100" rx="20" ry="10" fill="#6b7a42" transform="rotate(-10 150 -100)"/>
    <!-- garlic bulb -->
    <g transform="translate(-180 60)">
      <ellipse cx="0" cy="0" rx="30" ry="32" fill="#f4e8d0"/>
      <path d="M-12 -20 Q0 -35 12 -20" stroke="#d4c8a0" fill="none"/>
      <rect x="-2" y="-38" width="4" height="10" fill="#6b7a42"/>
    </g>
    <!-- lemon -->
    <g transform="translate(130 80)">
      <ellipse cx="0" cy="0" rx="48" ry="30" fill="#f4d060"/>
      <ellipse cx="-10" cy="-8" rx="18" ry="10" fill="#f8e098" opacity="0.6"/>
      <circle cx="42" cy="0" r="3" fill="#8a7020"/>
      <circle cx="-42" cy="0" r="3" fill="#8a7020"/>
    </g>
  </g>
  <text x="400" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2b2419" letter-spacing="8">WHAT'S IN SEASON</text>
</svg>
