<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0%" stop-color="#f9f0df"/><stop offset="100%" stop-color="#d7c5a4"/></radialGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8ecd4"/><stop offset="100%" stop-color="#e2d0a4"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- recipe card -->
  <g transform="translate(400 320) rotate(-3)">
    <rect x="-200" y="-160" width="400" height="320" fill="url(#paper)" stroke="#b8a577" stroke-width="1.2"/>
    <text x="0" y="-115" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#2b2419" letter-spacing="5" font-style="italic">la ricetta</text>
    <line x1="-150" y1="-95" x2="150" y2="-95" stroke="#b8a577" stroke-width="0.6"/>
    <!-- text lines -->
    <g stroke="#8a7a55" stroke-width="1.5" stroke-linecap="round">
      <line x1="-160" y1="-60" x2="160" y2="-60"/>
      <line x1="-160" y1="-35" x2="130" y2="-35"/>
      <line x1="-160" y1="-10" x2="150" y2="-10"/>
      <line x1="-160" y1="15" x2="100" y2="15"/>
      <line x1="-160" y1="40" x2="140" y2="40"/>
      <line x1="-160" y1="65" x2="110" y2="65"/>
      <line x1="-160" y1="90" x2="150" y2="90"/>
    </g>
    <!-- accent -->
    <circle cx="-140" cy="130" r="6" fill="#d97644"/>
    <text x="-120" y="135" font-family="Georgia, serif" font-size="10" fill="#6a4a2a" letter-spacing="2">PRIMO · NONNA'S</text>
  </g>
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2b2419" letter-spacing="8">RECIPES FROM THE KITCHEN</text>
</svg>
