<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0%" stop-color="#f9f0df"/><stop offset="100%" stop-color="#d7c5a4"/></radialGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d97644"/><stop offset="100%" stop-color="#8a3a14"/></linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cfc8b8"/><stop offset="100%" stop-color="#5a564d"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="0" y="420" width="800" height="180" fill="#c7a87a" opacity="0.22"/>
  <!-- copper pan -->
  <g transform="translate(400 350)">
    <ellipse cx="0" cy="0" rx="180" ry="30" fill="url(#copper)"/>
    <path d="M-180 0 L-180 50 Q-180 85 0 90 Q180 85 180 50 L180 0 Z" fill="url(#copper)" stroke="#6a2a10" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="170" ry="22" fill="#6a2a10" opacity="0.4"/>
    <!-- handle -->
    <rect x="175" y="-10" width="150" height="18" rx="4" fill="#3a2210"/>
    <rect x="320" y="-10" width="14" height="18" rx="3" fill="url(#copper)"/>
  </g>
  <!-- steam -->
  <g stroke="#c9b88f" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M340 300 Q330 260 360 230 Q390 200 370 160"/>
    <path d="M400 290 Q390 250 420 220 Q450 190 430 150"/>
    <path d="M460 300 Q450 260 480 230 Q510 200 490 160"/>
  </g>
  <text x="400" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2b2419" letter-spacing="8">KITCHEN STORIES</text>
</svg>
