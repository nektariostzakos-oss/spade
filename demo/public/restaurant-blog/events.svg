<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0%" stop-color="#f9f0df"/><stop offset="100%" stop-color="#d7c5a4"/></radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f4d060"/><stop offset="50%" stop-color="#d97644"/><stop offset="100%" stop-color="#8a3a14"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- three taper candles on candlestick -->
  <g transform="translate(400 470)">
    <!-- base -->
    <ellipse cx="0" cy="0" rx="120" ry="14" fill="#8a6a38"/>
    <rect x="-60" y="-6" width="120" height="18" fill="#a67c42"/>
    <rect x="-70" y="-12" width="140" height="10" fill="#c29650"/>
    <!-- candles -->
    <g>
      <rect x="-50" y="-160" width="14" height="150" fill="#f4e8cf"/>
      <path d="M-43 -170 Q-50 -180 -43 -196 Q-36 -180 -43 -170 Z" fill="url(#flame)"/>
    </g>
    <g>
      <rect x="-7" y="-180" width="14" height="170" fill="#f4e8cf"/>
      <path d="M0 -190 Q-7 -200 0 -218 Q7 -200 0 -190 Z" fill="url(#flame)"/>
    </g>
    <g>
      <rect x="36" y="-155" width="14" height="145" fill="#f4e8cf"/>
      <path d="M43 -165 Q36 -175 43 -191 Q50 -175 43 -165 Z" fill="url(#flame)"/>
    </g>
  </g>
  <text x="400" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2b2419" letter-spacing="8">EVENTS &amp; TASTINGS</text>
</svg>
