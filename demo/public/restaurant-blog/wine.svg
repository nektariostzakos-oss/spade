<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0%" stop-color="#f9f0df"/><stop offset="100%" stop-color="#d7c5a4"/></radialGradient>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6a1c1c"/><stop offset="100%" stop-color="#3a0c0c"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e8e0c8"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- two glasses overlapping -->
  <g transform="translate(340 380)">
    <rect x="-3" y="-120" width="6" height="120" fill="url(#glass)"/>
    <path d="M-80 -270 Q-80 -140 0 -120 Q80 -140 80 -270 Z" fill="url(#glass)" stroke="#c9b88f" opacity="0.85"/>
    <path d="M-70 -210 Q-72 -140 0 -128 Q72 -140 70 -210 Z" fill="url(#wine)" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="55" ry="6" fill="#c9b88f" opacity="0.6"/>
  </g>
  <g transform="translate(460 380)">
    <rect x="-3" y="-120" width="6" height="120" fill="url(#glass)"/>
    <path d="M-80 -270 Q-80 -140 0 -120 Q80 -140 80 -270 Z" fill="url(#glass)" stroke="#c9b88f" opacity="0.85"/>
    <path d="M-70 -200 Q-72 -140 0 -128 Q72 -140 70 -200 Z" fill="#7a2828" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="55" ry="6" fill="#c9b88f" opacity="0.6"/>
  </g>
  <text x="400" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2b2419" letter-spacing="8">NOTES FROM THE CELLAR</text>
</svg>
