<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0%" stop-color="#f9f0df"/><stop offset="100%" stop-color="#d7c5a4"/></radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- folded napkin with stamp -->
  <g transform="translate(400 330) rotate(-2)">
    <rect x="-200" y="-140" width="400" height="280" fill="#f8ecd4" stroke="#b8a577"/>
    <rect x="-180" y="-120" width="360" height="240" fill="none" stroke="#d97644" stroke-width="0.5"/>
    <text x="0" y="-80" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#2b2419" letter-spacing="8">VERDE</text>
    <text x="0" y="-50" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8a6a38" letter-spacing="4" font-style="italic">notizie dalla cucina</text>
    <line x1="-130" y1="-30" x2="130" y2="-30" stroke="#b8a577"/>
    <g stroke="#8a7a55" stroke-width="1.4" stroke-linecap="round">
      <line x1="-160" y1="0" x2="160" y2="0"/>
      <line x1="-160" y1="24" x2="140" y2="24"/>
      <line x1="-160" y1="48" x2="150" y2="48"/>
      <line x1="-160" y1="72" x2="120" y2="72"/>
    </g>
    <!-- stamp -->
    <circle cx="140" cy="105" r="32" fill="none" stroke="#d97644" stroke-width="2"/>
    <text x="140" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d97644" letter-spacing="2">NEW</text>
  </g>
</svg>
