<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#f9f0df"/>
      <stop offset="60%" stop-color="#ede0c8"/>
      <stop offset="100%" stop-color="#d7c5a4"/>
    </radialGradient>
    <linearGradient id="olive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b7a42"/>
      <stop offset="100%" stop-color="#4a5630"/>
    </linearGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97644"/>
      <stop offset="100%" stop-color="#b15228"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- subtle paper texture -->
  <g opacity="0.04">
    <rect x="0" y="80" width="800" height="1" fill="#2b2419"/>
    <rect x="0" y="160" width="800" height="1" fill="#2b2419"/>
    <rect x="0" y="240" width="800" height="1" fill="#2b2419"/>
    <rect x="0" y="320" width="800" height="1" fill="#2b2419"/>
    <rect x="0" y="400" width="800" height="1" fill="#2b2419"/>
  </g>
  <!-- olive branch decoration -->
  <g transform="translate(400 170)">
    <path d="M-180 0 Q-90 -30 0 0 Q90 -30 180 0" stroke="url(#olive)" stroke-width="1.8" fill="none"/>
    <g fill="url(#olive)">
      <ellipse cx="-140" cy="-14" rx="10" ry="5" transform="rotate(-20 -140 -14)"/>
      <ellipse cx="-100" cy="-20" rx="10" ry="5" transform="rotate(-10 -100 -20)"/>
      <ellipse cx="-60" cy="-22" rx="10" ry="5" transform="rotate(0 -60 -22)"/>
      <ellipse cx="-20" cy="-18" rx="10" ry="5" transform="rotate(10 -20 -18)"/>
      <ellipse cx="20" cy="-18" rx="10" ry="5" transform="rotate(-10 20 -18)"/>
      <ellipse cx="60" cy="-22" rx="10" ry="5" transform="rotate(0 60 -22)"/>
      <ellipse cx="100" cy="-20" rx="10" ry="5" transform="rotate(10 100 -20)"/>
      <ellipse cx="140" cy="-14" rx="10" ry="5" transform="rotate(20 140 -14)"/>
    </g>
    <!-- terracotta olives -->
    <circle cx="-40" cy="-8" r="5" fill="url(#terra)"/>
    <circle cx="40" cy="-8" r="5" fill="url(#terra)"/>
  </g>
  <!-- wordmark -->
  <text x="400" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="54" fill="#2b2419" letter-spacing="14" font-weight="400">VERDE</text>
  <text x="400" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="url(#terra)" letter-spacing="12" font-style="italic">cucina italiana</text>
  <!-- divider -->
  <line x1="330" y1="355" x2="470" y2="355" stroke="url(#olive)" stroke-width="0.8"/>
  <circle cx="400" cy="355" r="3" fill="url(#terra)"/>
  <!-- tagline -->
  <text x="400" y="385" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5a4e3a" letter-spacing="5">SLOW FOOD · FAMILY TABLE · SINCE 1962</text>
  <!-- corner tags -->
  <g font-family="Georgia, serif" font-size="9" fill="#5a4e3a" letter-spacing="3">
    <text x="40" y="40">· TEMPLATE</text>
    <text x="760" y="40" text-anchor="end">RESTAURANT ·</text>
    <text x="40" y="470">· 15 DISHES</text>
    <text x="760" y="470" text-anchor="end">5 COURSES ·</text>
  </g>
</svg>
