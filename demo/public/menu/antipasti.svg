<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0%" stop-color="#f9f0df"/><stop offset="100%" stop-color="#d7c5a4"/></radialGradient>
    <linearGradient id="olive" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6b7a42"/><stop offset="100%" stop-color="#4a5630"/></linearGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d97644"/><stop offset="100%" stop-color="#b15228"/></linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e3d6bc"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- wooden table hint -->
  <rect x="0" y="480" width="800" height="120" fill="#c7a87a" opacity="0.18"/>
  <!-- big round white plate top-down -->
  <ellipse cx="400" cy="330" rx="280" ry="200" fill="url(#plate)" stroke="#c9b88f" stroke-width="1.5"/>
  <ellipse cx="400" cy="320" rx="230" ry="160" fill="none" stroke="#d9c9a2" stroke-width="0.8" opacity="0.7"/>
  <!-- bruschetta slices -->
  <g>
    <ellipse cx="280" cy="300" rx="75" ry="20" fill="#d9a56a" transform="rotate(-10 280 300)"/>
    <ellipse cx="280" cy="296" rx="72" ry="14" fill="#c66b3d" transform="rotate(-10 280 300)" opacity="0.85"/>
    <circle cx="250" cy="292" r="5" fill="#a62c2c"/>
    <circle cx="275" cy="290" r="5" fill="#a62c2c"/>
    <circle cx="300" cy="296" r="5" fill="#a62c2c"/>
    <ellipse cx="280" cy="284" rx="8" ry="3" fill="#6b7a42"/>
  </g>
  <g>
    <ellipse cx="510" cy="310" rx="75" ry="20" fill="#d9a56a" transform="rotate(8 510 310)"/>
    <ellipse cx="510" cy="306" rx="72" ry="14" fill="#c66b3d" transform="rotate(8 510 310)" opacity="0.85"/>
    <circle cx="490" cy="304" r="5" fill="#a62c2c"/>
    <circle cx="515" cy="300" r="5" fill="#a62c2c"/>
    <circle cx="540" cy="308" r="5" fill="#a62c2c"/>
    <ellipse cx="510" cy="294" rx="8" ry="3" fill="#6b7a42"/>
  </g>
  <!-- burrata-like ball -->
  <circle cx="400" cy="380" r="38" fill="#ffffff" stroke="#d9c9a2" stroke-width="1"/>
  <circle cx="400" cy="380" r="38" fill="url(#plate)" opacity="0.4"/>
  <!-- basil leaves -->
  <ellipse cx="390" cy="350" rx="14" ry="5" fill="url(#olive)" transform="rotate(-30 390 350)"/>
  <ellipse cx="415" cy="352" rx="12" ry="4" fill="url(#olive)" transform="rotate(20 415 352)"/>
  <!-- olive oil drizzle (gold) -->
  <path d="M320 420 Q400 410 480 420" stroke="#d9a56a" stroke-width="2" fill="none" opacity="0.7"/>
  <text x="400" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2b2419" letter-spacing="8">ANTIPASTI · TO BEGIN</text>
</svg>
