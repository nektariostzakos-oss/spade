<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%"><stop offset="0%" stop-color="#f9f0df"/><stop offset="100%" stop-color="#d7c5a4"/></radialGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e3d6bc"/></linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff5d9"/><stop offset="100%" stop-color="#e8d9a8"/></linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6a4a2a"/><stop offset="100%" stop-color="#3a2210"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="0" y="480" width="800" height="120" fill="#c7a87a" opacity="0.18"/>
  <ellipse cx="400" cy="370" rx="260" ry="170" fill="url(#plate)" stroke="#c9b88f" stroke-width="1.5"/>
  <!-- tiramisù square layered -->
  <g transform="translate(400 360)">
    <!-- bottom cake plate -->
    <rect x="-140" y="-70" width="280" height="140" rx="6" fill="url(#cream)"/>
    <!-- cocoa dust on top -->
    <rect x="-140" y="-70" width="280" height="20" fill="url(#coffee)" opacity="0.75"/>
    <rect x="-140" y="-70" width="280" height="20" fill="#6a4a2a"/>
    <g fill="#3a2210" opacity="0.7">
      <circle cx="-100" cy="-60" r="2"/>
      <circle cx="-60" cy="-62" r="1.5"/>
      <circle cx="-20" cy="-58" r="2.5"/>
      <circle cx="30" cy="-63" r="2"/>
      <circle cx="70" cy="-58" r="1.8"/>
      <circle cx="110" cy="-61" r="2.2"/>
    </g>
    <!-- espresso-soaked ladyfinger layer -->
    <rect x="-140" y="-10" width="280" height="18" fill="#a07040" opacity="0.85"/>
    <!-- mascarpone middle -->
    <rect x="-140" y="8" width="280" height="30" fill="url(#cream)"/>
    <!-- second ladyfinger -->
    <rect x="-140" y="38" width="280" height="18" fill="#a07040" opacity="0.85"/>
    <!-- bottom cream -->
    <rect x="-140" y="56" width="280" height="14" fill="url(#cream)"/>
    <!-- chocolate shavings on plate -->
    <polygon points="-180,70 -160,76 -170,86" fill="#3a2210"/>
    <polygon points="180,68 200,74 190,84" fill="#3a2210"/>
  </g>
  <!-- sprig of mint -->
  <g transform="translate(500 300)">
    <ellipse cx="0" cy="0" rx="14" ry="7" fill="#6b7a42"/>
    <ellipse cx="12" cy="-4" rx="10" ry="5" fill="#4a5630"/>
  </g>
  <!-- espresso cup (small, to the side) -->
  <g transform="translate(250 220)">
    <ellipse cx="0" cy="30" rx="36" ry="10" fill="#ffffff" stroke="#c9b88f"/>
    <path d="M-36 30 Q-36 -6 -28 -10 L28 -10 Q36 -6 36 30 Z" fill="#ffffff" stroke="#c9b88f"/>
    <ellipse cx="0" cy="-10" rx="28" ry="6" fill="url(#coffee)"/>
    <ellipse cx="0" cy="-10" rx="24" ry="4" fill="#8a6030" opacity="0.6"/>
  </g>
  <text x="400" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2b2419" letter-spacing="8">DOLCI · SWEETS</text>
</svg>
