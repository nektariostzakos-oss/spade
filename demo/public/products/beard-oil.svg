<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%"><stop offset="0%" stop-color="#1c1814"/><stop offset="60%" stop-color="#0f0c09"/><stop offset="100%" stop-color="#050403"/></radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e3c88a"/><stop offset="55%" stop-color="#c9a961"/><stop offset="100%" stop-color="#8a6f33"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3a2c1a"/><stop offset="100%" stop-color="#120a04"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="525" rx="95" ry="9" fill="#000" opacity="0.55"/>
  <!-- dropper bottle: rectangular body with rounded bottom, long neck, bulb top -->
  <rect x="350" y="240" width="100" height="270" rx="10" fill="url(#amber)" stroke="#3a2c1a" stroke-width="2"/>
  <!-- neck -->
  <rect x="380" y="180" width="40" height="70" fill="url(#amber)" stroke="#3a2c1a" stroke-width="2"/>
  <!-- collar -->
  <rect x="374" y="170" width="52" height="16" fill="url(#gold)"/>
  <!-- dropper bulb -->
  <ellipse cx="400" cy="140" rx="22" ry="28" fill="url(#gold)"/>
  <!-- oil liquid inside body -->
  <rect x="360" y="360" width="80" height="140" rx="6" fill="#8a6f33" opacity="0.4"/>
  <!-- label -->
  <rect x="358" y="300" width="84" height="60" fill="#0a0806" stroke="#c9a961" stroke-width="1" opacity="0.9"/>
  </svg>
