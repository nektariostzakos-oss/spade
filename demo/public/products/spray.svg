<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%"><stop offset="0%" stop-color="#1c1814"/><stop offset="60%" stop-color="#0f0c09"/><stop offset="100%" stop-color="#050403"/></radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e3c88a"/><stop offset="55%" stop-color="#c9a961"/><stop offset="100%" stop-color="#8a6f33"/></linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a241e"/><stop offset="100%" stop-color="#0a0806"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="520" rx="110" ry="10" fill="#000" opacity="0.55"/>
  <!-- tall bottle body -->
  <rect x="340" y="200" width="120" height="310" rx="12" fill="url(#bottle)" stroke="#3a332a" stroke-width="2"/>
  <!-- shoulders -->
  <path d="M340 210 Q400 180 460 210" fill="url(#bottle)" stroke="#3a332a" stroke-width="2"/>
  <!-- neck -->
  <rect x="380" y="155" width="40" height="40" fill="url(#bottle)" stroke="#3a332a" stroke-width="2"/>
  <!-- spray trigger head -->
  <path d="M360 130 L440 130 L460 160 L340 160 Z" fill="url(#gold)"/>
  <path d="M460 145 L510 155 L510 165 L460 170 Z" fill="url(#gold)"/>
  <!-- mist dots -->
  <circle cx="540" cy="150" r="3" fill="#c9a961" opacity="0.7"/>
  <circle cx="560" cy="145" r="2" fill="#c9a961" opacity="0.5"/>
  <circle cx="555" cy="165" r="2" fill="#c9a961" opacity="0.5"/>
  <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#c9a961" letter-spacing="5">SEA SALT</text>
  <text x="400" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8a7d63" letter-spacing="4">TEXTURE SPRAY</text>
</svg>
