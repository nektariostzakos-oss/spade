<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%"><stop offset="0%" stop-color="#1c1814"/><stop offset="60%" stop-color="#0f0c09"/><stop offset="100%" stop-color="#050403"/></radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e3c88a"/><stop offset="55%" stop-color="#c9a961"/><stop offset="100%" stop-color="#8a6f33"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a241e"/><stop offset="50%" stop-color="#1a1612"/><stop offset="100%" stop-color="#0a0806"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="525" rx="75" ry="8" fill="#000" opacity="0.55"/>
  <!-- slim apothecary bottle -->
  <rect x="355" y="220" width="90" height="290" rx="8" fill="url(#glass)" stroke="#3a332a" stroke-width="2"/>
  <path d="M355 230 Q400 200 445 230" fill="url(#glass)" stroke="#3a332a" stroke-width="2"/>
  <!-- long slim neck -->
  <rect x="385" y="160" width="30" height="60" fill="url(#glass)" stroke="#3a332a" stroke-width="2"/>
  <!-- metal cap -->
  <rect x="378" y="130" width="44" height="35" fill="url(#gold)"/>
  <rect x="378" y="160" width="44" height="6" fill="#8a6f33"/>
  <!-- tonic liquid -->
  <rect x="361" y="340" width="78" height="165" rx="4" fill="#6a5530" opacity="0.35"/>
  <!-- label -->
  <rect x="361" y="280" width="78" height="70" fill="#0a0806" stroke="#c9a961" opacity="0.9"/>
  <text x="400" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c9a961" letter-spacing="4">SPADE</text>
  <text x="400" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c9a961" letter-spacing="2">TONIC</text>
</svg>
