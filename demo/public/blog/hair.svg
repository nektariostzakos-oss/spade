    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3a2a1c"/><stop offset="100%" stop-color="#0e0805"/></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
