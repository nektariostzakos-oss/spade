services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: spade
      MARIADB_USER: spade
      MARIADB_PASSWORD: spade
      MARIADB_ROOT_PASSWORD: rootpw
    volumes:
      - spade_db:/var/lib/mysql

  wp:
    image: wordpress:6.7-php8.3-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: spade
      WORDPRESS_DB_USER: spade
      WORDPRESS_DB_PASSWORD: spade
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME','http://localhost:8080');
        define('WP_SITEURL','http://localhost:8080');
        define('FS_METHOD','direct');
        define('WP_POST_REVISIONS', 5);
        define('AUTOSAVE_INTERVAL', 120);
        define('DISABLE_WP_CRON', false);
        define('CONCATENATE_SCRIPTS', false);
    volumes:
      - spade_wp:/var/www/html
      - ./spade-theme:/var/www/html/wp-content/themes/spade-theme
      - ./docker/php-spade.ini:/usr/local/etc/php/conf.d/zz-spade.ini:ro
      - ./docker/apache-spade.conf:/etc/apache2/conf-enabled/zz-spade.conf:ro

volumes:
  spade_db:
  spade_wp:
