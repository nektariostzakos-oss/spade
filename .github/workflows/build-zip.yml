name: Build deployment ZIPs

on:
  push:
    branches: [main, master]
    paths:
      - "demo/src/**"
      - "demo/public/**"
      - "demo/data/**"
      - "demo/demos/**"
      - "demo/*.json"
      - "demo/*.ts"
      - "demo/*.mjs"
      - "demo/DEPLOY.md"
      - "build-zip.py"
      - ".github/workflows/build-zip.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ZIPs
        run: python build-zip.py

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spade-nextjs.zip spade-nextjs.tar.gz spade-nextjs-clean.zip spade-nextjs-clean.tar.gz
          if git diff --cached --quiet; then
            echo "No ZIP changes to commit."
          else
            git commit -m "ci: rebuild deployment ZIPs"
            git push
          fi
