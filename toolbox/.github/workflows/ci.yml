name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: toolbox
          POSTGRES_PASSWORD: toolbox
          POSTGRES_DB: toolbox
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U toolbox"
          --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://toolbox:toolbox@localhost:5432/toolbox
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @toolbox/db exec prisma generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @toolbox/web exec playwright install --with-deps chromium webkit
      - run: pnpm --filter @toolbox/web build
      - run: pnpm --filter @toolbox/web start &
      - run: npx wait-on http://localhost:3000 --timeout 60000
      - run: pnpm --filter @toolbox/web test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
